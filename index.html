<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Money Heist</title>

    <!-- Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: #1d2b53;
            color: #fff1e8;

            font-family: 'Press Start 2P', 'Microsoft JhengHei', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
        }

        .card {

            width: 650px;

            background: #29366f;

            border: 6px solid black;

            padding: 35px;

            box-shadow: 10px 10px black;

        }

        h1 {

            text-align: center;

            color: #ffd54f;

            font-size: 30px;

            margin-bottom: 35px;

            text-shadow: 4px 4px black;

        }

        .money {

            text-align: center;

            font-size: 46px;

            color: #faf0f3ee;

            margin: 40px 0;

            text-shadow: 4px 4px black;

        }

        .progress {

            width: 100%;

            height: 40px;

            border: 4px solid black;

            background: #111;

            margin-top: 25px;

            overflow: hidden;

        }

        .bar {

            width: 0%;

            height: 100%;

            background:

                repeating-linear-gradient(
                        90deg,
                        #f99ba4 0px,
                        #feb3bb 18px,
                        #fec1cc 18px,
                        #f8cdde 22px);

            transition: width .15s linear;

        }

        .percent {

            text-align: center;

            margin-top: 18px;

            color: #faccd3;

            font-size: 18px;

        }

        .panel {

            margin-top: 45px;

            border: 4px solid black;

            padding: 22px;

            background: #1d2b53;

        }

        .row {

            display: flex;

            justify-content: space-between;

            margin: 18px 0;

            font-size: 16px;

        }

        .label {

            color: #29adff;

        }

        .value {

            color: white;

        }

        .setup {

            text-align: center;

            margin-bottom: 35px;

        }

        .setup p {

            margin-bottom: 18px;

            color: #f2b9c3;

            font-size: 16px;

        }

        input[type=time] {
            height: 60px;

            background: #1d2b53;

            color: rgb(247, 245, 245);

            border: 4px solid rgba(0, 0, 0, 0.675);

            padding: 0 12px;

            font-size: 18px;

            font-family: inherit;

        }

        button {
            height: 60px;

            margin-left: 15px;

            font-family: inherit;

            font-size: 14px;

            background: #edb0c4;

            color: black;

            border: 4px solid black;

            padding: 12px 18px;

            cursor: pointer;

        }

        button:hover {

            background: #e6be3b;

        }

        .footer {

            margin-top: 35px;

            text-align: center;

            color: #ffd54f;

            font-size: 12px;

        }

        .blink {

            animation: blink .8s infinite;
        }

        @keyframes blink {

            50% {
                opacity: .3;
            }

        }
    </style>

</head>

<body>

    <div class="card">

        <h1>MONEY HEIST</h1>

        <div class="setup">

            <p>START TIME</p>

            <input id="startTime" type="time" value="09:00">

            <button id="startBtn">
                START
            </button>

        </div>

        <div class="money" id="money">

            NT$0.00

        </div>

        <div class="progress">

            <div class="bar" id="bar"></div>

        </div>

        <div class="percent" id="percent">

            0%

        </div>

        <div class="panel">

            <div class="row">

                <span class="label">
                    START
                </span>

                <span class="value" id="startText">
                    --
                </span>

            </div>

            <div class="row">

                <span class="label">
                    END
                </span>

                <span class="value" id="endText">
                    --
                </span>

            </div>

            <div class="row">

                <span class="label">
                    BONUS TIME
                </span>

                <span class="value" id="bonusText">
                    --
                </span>

            </div>

            <div class="row">

                <span class="label blink">
                    TIME LEFT
                </span>

                <span class="value" id="leftTime">

                    --:--:--

                </span>

            </div>

        </div>

    </div>

    <script>
const hourlySalary = 272.95;
const workSeconds = 9 * 60 * 60;

let started = false;
let startTime = null;
let endTime = null;
let bonusTimePoint = null;

const startInput = document.getElementById("startTime");
const startBtn = document.getElementById("startBtn");

const money = document.getElementById("money");
const bar = document.getElementById("bar");
const percent = document.getElementById("percent");

const startText = document.getElementById("startText");
const endText = document.getElementById("endText");
const leftTime = document.getElementById("leftTime");
const bonusText = document.getElementById("bonusText");

function formatTime(date){

    let h = String(date.getHours()).padStart(2,"0");
    let m = String(date.getMinutes()).padStart(2,"0");

    return `${h}:${m}`;
}

function formatCountdown(sec){

    if(sec < 0) sec = 0;

    let h = Math.floor(sec / 3600);
    let m = Math.floor((sec % 3600) / 60);
    let s = Math.floor(sec % 60);

    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

startBtn.onclick = function(){

    let value = startInput.value;

    if(value=="")
        return;

    let hh = Number(value.split(":")[0]);
    let mm = Number(value.split(":")[1]);

    startTime = new Date();

    startTime.setHours(hh);
    startTime.setMinutes(mm);
    startTime.setSeconds(0);

    endTime = new Date(startTime.getTime() + workSeconds * 1000);

    bonusTimePoint = new Date(startTime.getTime() + 10.5 * 60 * 60 * 1000);

    started = true;

    startText.innerHTML = formatTime(startTime);

    endText.innerHTML = formatTime(endTime);

    bonusText.innerHTML = formatTime(bonusTimePoint);

    document.querySelector(".setup").style.display = "none";

}

function update(){

    if(!started)
        return;

    let now = new Date();

    let worked = (now - startTime) / 1000;

    if(worked < 0)
        worked = 0;

    if(worked > workSeconds)
        worked = workSeconds;

    let salary = worked / 3600 * hourlySalary;

    money.innerHTML = "NT$" + salary.toFixed(2);

    let progress = worked / workSeconds * 100;

    bar.style.width = progress + "%";

    percent.innerHTML = progress.toFixed(1) + "%";

    let remain = (endTime - now) / 1000;

    leftTime.innerHTML = formatCountdown(remain);

}

setInterval(update,100);
</script>

</body>
</html>
