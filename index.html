<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Heist</title>

    <!-- Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <h1>MONEY HEIST</h1>

        <div class="setup">

            <p>START TIME</p>

            <input id="startTime" type="time" value="09:00">

            <button id="startBtn">
                START
            </button>

        </div>

        <div class="money" id="money">

            NT$0.00

        </div>

        <div class="progress">

            <div class="bar" id="bar"></div>

        </div>

        <div class="percent" id="percent">

            0%

        </div>

        <div class="panel">

            <div class="row">

                <span class="label">
                    START
                </span>

                <span class="value" id="startText">
                    --
                </span>

            </div>

            <div class="row">

                <span class="label">
                    END
                </span>

                <span class="value" id="endText">
                    --
                </span>

            </div>

            <div class="row">

                <span class="label">
                    BONUS TIME
                </span>

                <span class="value" id="bonusText">
                    --
                </span>

            </div>

            <div class="row">

                <span class="label blink">
                    TIME LEFT
                </span>

                <span class="value" id="leftTime">

                    --:--:--

                </span>

            </div>

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
